- name : Starts with Error handling
  hosts : local
  connection : local
  become : yes

  tasks :
  - name : check roboshop user exitst or not
    command : id roboshop
    ignore_errors : true
    register : user_output

  - name : print user output
    debug :
      msg : "{{ user_output }}"
  - name : create user 
    command : useradd roboshop
    when : user_output.rc != 0