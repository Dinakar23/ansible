- name : Lets dive into Filters
  hosts : local
  connection : local
  vars :
    topics : Linux , shell , ansible , python
    tagMaps:
      name : ansible
      project : roboshop
      environment : Dev
    list : [{'key': 'name', 'value': 'ansible'}, {'key': 'project', 'value': 'roboshop'}, {'key': 'environment', 'value': 'Dev'}]
    name : Gaddam Dinakar
    ip_address : 345:24:23:123
  tasks :
  - name : to convert string to list
    debug :
      msg : "{{ topics | split (',') }}"    
  
  - name : Default Value
    debug :
      msg : "{{ greetings | default ('Welcome to Nothing') }}"

  - name : Convert map to list
    debug :
     msg : "Converting from Maps to List {{ tagMaps | dict2items }}"

  - name : convert list map
    debug :
      msg : "{{ list | items2dict }}"
  - name : Convert to UPPER
    debug :
      msg : " {{ name | upper }}"

  - name : Convert to lower
    debug : 
      msg : "{{ name | lower }}"

  - name : Checking the ip is valid or not
    debug : 
      msg : "{{ ip_address | ansible.utils.ipv4 }}"