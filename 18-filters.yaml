- name : Lets dive into Filters
  hosts : local
  connection : local
  vars :
    topics : Linux , shell , ansible , python
  tagMaps:
    name : ansible
    project : roboshop
    environment : Dev
  tasks :
  - name : to convert string to list
    debug :
      msg : "{{ topics | split (',') }}"    
  
  - name : Default Value
    debug :
      msg : "{{ greetings | default ('Welcome to Nothing') }}"
  - name : Convert map to list
    debug :
     msg : "Converting from Maps to List {{ tagMap | dict2items }}"